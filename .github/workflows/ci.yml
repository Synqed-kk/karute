name: CI

on:
  pull_request:
    branches:
      - integration
      - main

jobs:
  ci:
    name: Lint, Type-check, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        # NOTE: next lint was removed in Next.js 16 — package.json uses "eslint src" directly

      - name: Type-check
        run: npm run type-check
        # tsc --noEmit

      - name: Test
        run: npm test -- --passWithNoTests
        # --passWithNoTests allows CI to pass when no test files exist yet (Phase 8 adds tests)
